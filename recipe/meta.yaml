{% set name = "vala" %}
{% set version = "0.56.18" %}
{% set minor_version = '.'.join(version.split('.')[:2]) %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://download.gnome.org/sources/vala/{{ minor_version }}/vala-{{ version }}.tar.xz
  sha256: f2affe7d40ab63db8e7b9ecc3f6bdc9c2fc7e3134c84ff2d795f482fe926a382

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - pkg-config
    - bison
    - flex
    - make
  host:
    - glib
    - gobject-introspection

test:
  files:
    - test.vala
  commands:
    - valac test.vala && ./test

about:
  home: https://gitlab.gnome.org/GNOME/vala
  summary: Compiler for the GObject type system
  license: LGPL-2.1-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - xhochy
