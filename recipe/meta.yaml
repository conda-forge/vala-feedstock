{% set name = "vala" %}
{% set version = "0.56.19" %}
{% set minor_version = '.'.join(version.split('.')[:2]) %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://download.gnome.org/sources/vala/{{ minor_version }}/vala-{{ version }}.tar.xz
  sha256: 5ad7cbbfcc0de61b403d6797c9ef60455bfbebd8e162aec33b5b0b097adfb9d5

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - pkg-config
    - bison
    - flex
    - make
  host:
    - glib
    - gobject-introspection

test:
  files:
    - test.vala
  commands:
    - valac test.vala && ./test

about:
  home: https://gitlab.gnome.org/GNOME/vala
  summary: Compiler for the GObject type system
  license: LGPL-2.1-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - xhochy
